```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Universe</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
overflow:hidden;

background:linear-gradient(-45deg,#0f0524,#3b0066,#6a00a8,#ff008c);
background-size:400% 400%;
animation:bgmove 15s infinite ease;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* falling petals */

.petal{
position:absolute;
top:-20px;
font-size:18px;
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
0%{transform:translateY(-20px) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* floating hearts */

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}

/* main card */

.card{
text-align:center;
padding:40px 60px;
border-radius:20px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(12px);
box-shadow:0 0 40px rgba(255,0,150,.6);
z-index:5;
max-width:600px;
width:90%;
}

h1{
font-size:42px;
letter-spacing:3px;
color:#ffd6ff;
text-shadow:0 0 25px #ff4df0;
}

.typewriter{
margin-top:15px;
font-size:20px;
border-right:3px solid white;
white-space:nowrap;
overflow:hidden;
display:inline-block;
}

/* button */

.btn{
margin-top:25px;
padding:14px 30px;
font-size:18px;
border:none;
border-radius:40px;
cursor:pointer;
background:linear-gradient(45deg,#ff008c,#ff4df0);
color:white;
box-shadow:0 0 20px #ff4df0;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* love letter */

.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:90%;
max-width:500px;
background:#fff;
color:#333;
padding:30px;
border-radius:15px;
box-shadow:0 0 40px #ff008c;
transition:.5s;
z-index:10;
}

.letter.active{
transform:translate(-50%,-50%) scale(1);
}

.letter h2{
margin-bottom:10px;
color:#ff008c;
}

.close{
margin-top:15px;
padding:10px 20px;
border:none;
background:#ff008c;
color:white;
border-radius:30px;
cursor:pointer;
}

/* heart explosion */

.explode{
position:absolute;
font-size:20px;
animation:boom 1s forwards;
}

@keyframes boom{
0%{transform:scale(1);opacity:1}
100%{transform:scale(3) translateY(-100px);opacity:0}
}

footer{
position:fixed;
bottom:10px;
font-size:14px;
opacity:.8;
}

</style>
</head>

<body>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9b7f5d.mp3" type="audio/mpeg">
</audio>

<div class="card">

<h1>GOOD VIBES ONLY ✨</h1>

<div class="typewriter" id="text"></div>

<br>

<button class="btn" onclick="openLetter()">
Enter Love ❤️
</button>

</div>

<div class="letter" id="letter">

<h2>My Love Letter 💌</h2>

<p>

Every moment with you feels magical.<br><br>

Your smile brightens my darkest days.<br><br>

If love had a name, it would be yours.<br><br>

You are not just someone special…<br>
you are my happiness, my peace, my world.<br><br>

Forever yours ❤️

</p>

<button class="close" onclick="closeLetter()">Close</button>

</div>

<footer>
© Pandey Ji
</footer>

<script>

/* typewriter */

const message="Every smile of yours makes my day brighter Khushi ✨";
let i=0;

function type(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(type,60);
}
}

type();

/* falling petals */

for(let i=0;i<25;i++){

let p=document.createElement("div");
p.className="petal";
p.innerHTML="🌹";

p.style.left=Math.random()*100+"%";
p.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(p);

}

/* floating hearts */

for(let i=0;i<20;i++){

let h=document.createElement("div");
h.className="heart";
h.innerHTML="💖";

h.style.left=Math.random()*100+"%";
h.style.animationDuration=(8+Math.random()*5)+"s";

document.body.appendChild(h);

}

/* open love letter */

function openLetter(){

document.getElementById("letter").classList.add("active");
document.getElementById("music").play();

}

/* close */

function closeLetter(){

document.getElementById("letter").classList.remove("active");

}

/* heart explosion */

document.body.addEventListener("click",function(e){

let heart=document.createElement("div");
heart.className="explode";
heart.innerHTML="💖";

heart.style.left=e.pageX+"px";
heart.style.top=e.pageY+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},1000)

});

</script>

</body>
</html>
```
