<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Vibes</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', sans-serif;

    /* Royal Gradient Background */
    background: linear-gradient(135deg,#1a0033,#4b0082,#800080,#b8860b);
    background-size:400% 400%;
    animation: royalBG 12s ease infinite;
    color:white;
}

/* Background animation */
@keyframes royalBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Main vibe box */
.vibe-box{
    text-align:center;
    padding:40px 60px;
    border-radius:15px;
    background:rgba(0,0,0,0.35);
    backdrop-filter: blur(8px);
    box-shadow:0 0 25px rgba(255,215,0,0.7);
}

/* Heading */
h1{
    font-size:48px;
    letter-spacing:3px;
    color:#FFD700;
    text-shadow:0 0 15px #FFD700;
    animation: glow 2s infinite alternate;
}

/* Text */
p{
    font-size:20px;
    margin-top:10px;
}

/* Glow animation */
@keyframes glow{
from{ text-shadow:0 0 10px #FFD700;}
to{ text-shadow:0 0 30px #FFD700;}
}

/* Footer */
footer{
    position:fixed;
    bottom:10px;
    font-size:14px;
    opacity:0.8;
}
</style>
</head>

<body>

<div class="vibe-box">
<h1>GOOD VIBES ONLY ✨</h1>
<p>Positive Energy • Royal Feel • Peaceful Mind</p>
<p>Stay Positive & Keep Smiling 😊</p>
</div>

<footer>
© Copyright Pandey Ji
</footer>

</body>
</html>
